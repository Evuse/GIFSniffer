<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIFSniffer</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>GIFSniffer</h1>
      <p>Scarica video da Pinterest/Instagram oppure convertili in GIF.</p>

      <label>URL del contenuto</label>
      <input id="url" placeholder="https://..." />

      <button onclick="loadInfo()">Analizza Formati</button>
      <pre id="info"></pre>

      <section>
        <h2>Download Video</h2>
        <form action="/api/download/video" method="post">
          <input name="url" id="video-url" hidden />
          <label>Format ID</label><input name="format_id" value="best" />
          <label>Dimensione</label>
          <select name="size">
            <option value="original">Originale</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
            <option value="360p">360p</option>
          </select>
          <label>Qualità (CRF 18-30)</label><input name="crf" type="number" min="18" max="30" value="23" />
          <button type="submit">Scarica Video</button>
        </form>
      </section>

      <section>
        <h2>Download GIF</h2>
        <form action="/api/download/gif" method="post">
          <input name="url" id="gif-url" hidden />
          <label>Larghezza px</label><input name="width" type="number" min="180" max="1080" value="480" />
          <label>FPS</label><input name="fps" type="number" min="5" max="30" value="12" />
          <label>Colori (16-256)</label><input name="colors" type="number" min="16" max="256" value="128" />
          <label>Velocità (1.0 normale)</label><input name="speed" type="number" step="0.1" min="0.2" max="3" value="1.0" />
          <button type="submit">Scarica GIF</button>
        </form>
      </section>
    </main>

    <script>
      const info = document.getElementById('info');
      const urlInput = document.getElementById('url');
      const videoUrl = document.getElementById('video-url');
      const gifUrl = document.getElementById('gif-url');

      urlInput.addEventListener('input', () => {
        videoUrl.value = urlInput.value;
        gifUrl.value = urlInput.value;
      });

      async function loadInfo() {
        info.textContent = 'Analisi in corso...';
        const res = await fetch('/api/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput.value })
        });
        const data = await res.json();
        info.textContent = JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
